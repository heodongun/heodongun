<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="portfolioTitle portfolioDesc">
  <title id="portfolioTitle">Portfolio beam call-to-action</title>
  <desc id="portfolioDesc">A bright neon card encouraging visitors to open the linked portfolio.</desc>
  <defs>
    <linearGradient id="portBg" x1="60" y1="42" x2="1132" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1022"/>
      <stop offset="0.52" stop-color="#16153A"/>
      <stop offset="1" stop-color="#0B0F1C"/>
    </linearGradient>
    <linearGradient id="portLine" x1="64" y1="48" x2="1136" y2="268" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F0FF"/>
      <stop offset="0.48" stop-color="#FF2BD6"/>
      <stop offset="1" stop-color="#FF8A00"/>
    </linearGradient>
    <filter id="portGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="1160" height="280" rx="32" fill="url(#portBg)"/>
  <rect x="20.5" y="20.5" width="1159" height="279" rx="31.5" stroke="url(#portLine)" stroke-opacity="0.58"/>

  <circle cx="152" cy="162" r="72" fill="#00F0FF" fill-opacity="0.12"/>
  <circle cx="1032" cy="162" r="82" fill="#FF2BD6" fill-opacity="0.12"/>
  <circle cx="1032" cy="162" r="28" fill="#FF2BD6" filter="url(#portGlow)">
    <animate attributeName="opacity" values="0.9;0.45;0.9" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="152" cy="162" r="24" fill="#00F0FF" filter="url(#portGlow)">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="4.6s" repeatCount="indefinite"/>
  </circle>

  <text x="120" y="102" fill="#C7F9FF" font-family="'Space Grotesk', 'Pretendard', sans-serif" font-size="18" font-weight="700" letter-spacing="3">PORTAL ACCESS</text>
  <text x="120" y="156" fill="#F7FBFF" font-family="'Space Grotesk', 'Pretendard', sans-serif" font-size="54" font-weight="800">Open The Portfolio Gate</text>
  <text x="120" y="202" fill="#AAB8D7" font-family="'Space Grotesk', 'Pretendard', sans-serif" font-size="24" font-weight="500">If the README felt normal, the portfolio should fix that immediately.</text>
  <text x="120" y="236" fill="#AAB8D7" font-family="'Space Grotesk', 'Pretendard', sans-serif" font-size="24" font-weight="500">Tap the button, jump the beam, and go straight into the full showcase.</text>

  <rect x="120" y="258" width="212" height="30" rx="15" fill="#00F0FF" fill-opacity="0.14" stroke="#00F0FF" stroke-opacity="0.56"/>
  <text x="226" y="278" text-anchor="middle" fill="#E6FCFF" font-family="'Space Grotesk', 'Pretendard', sans-serif" font-size="15" font-weight="700" letter-spacing="2.2">NOTION PORTFOLIO LINKED</text>

  <g transform="translate(780 76)">
    <rect width="246" height="168" rx="26" fill="#0E142D" stroke="#2ADFFF" stroke-opacity="0.46"/>
    <rect x="26" y="26" width="194" height="16" rx="8" fill="#172149"/>
    <rect x="26" y="58" width="122" height="10" rx="5" fill="#29407D"/>
    <rect x="26" y="92" width="194" height="18" rx="9" fill="#1C2448"/>
    <rect x="26" y="122" width="152" height="18" rx="9" fill="#1C2448"/>
    <path d="M164 92H220" stroke="#FF2BD6" stroke-width="3" stroke-linecap="round"/>
    <path d="M110 122H220" stroke="#FF8A00" stroke-width="3" stroke-linecap="round"/>
  </g>

  <path d="M942 42L1134 42" stroke="url(#portLine)" stroke-width="2" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.15;0.95;0.15" dur="3.8s" repeatCount="indefinite"/>
  </path>
  <path d="M942 278L1134 278" stroke="url(#portLine)" stroke-width="2" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.95;0.15;0.95" dur="4.2s" repeatCount="indefinite"/>
  </path>
</svg>
